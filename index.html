<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tap or Die</title>
  <script>
    window.yaContextCb = window.yaContextCb || [];
  </script>
  <script src="https://yandex.ru/ads/system/context.js" async></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --accent: #ff6a00;
      --accent-2: #36d1dc;
      --text: #f5f7ff;
      --muted: #a7b0c0;
      --danger: #ff3b3b;
      --success: #32d583;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
    }

    html, body {
      height: 100%;
      background: radial-gradient(1200px 800px at 50% -10%, #1f2430 0%, var(--bg) 55%);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game {
      width: min(420px, 100%);
      min-height: 620px;
      background: linear-gradient(180deg, #151a23 0%, #12161d 100%);
      border-radius: 22px;
      padding: 20px 18px 24px;
      box-shadow: 0 20px 60px var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .subheader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .streak, .best {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .progress {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c8d2e6;
      white-space: nowrap;
    }

    .streak span, .best span {
      color: var(--text);
      font-size: 13px;
    }

    .chips {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .score span {
      font-size: 18px;
      color: var(--text);
      margin-left: 6px;
    }

    .timer {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: #1d2430;
      overflow: hidden;
      position: relative;
    }

    .timer-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-2), var(--accent));
      transition: width 0.1s linear;
    }

    .timer-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c6d0e1;
      opacity: 0.9;
      pointer-events: none;
    }

    .lives {
      font-size: 16px;
      letter-spacing: 3px;
      white-space: nowrap;
    }

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 12px 6px;
      animation: fadeIn 0.4s ease;
    }

    .question {
      font-size: 22px;
      line-height: 1.4;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buttons {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    .ad-slot {
      width: 100%;
      min-height: 70px;
      border-radius: 12px;
      background: rgba(15, 19, 26, 0.6);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8f9bb0;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .visual {
      width: 100%;
      height: 240px;
      border-radius: 0;
      background: transparent;
      overflow: hidden;
      animation: floatIn 0.6s ease;
    }

    .visual svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .visual svg .scene-icon {
      animation: iconFloat 3.2s ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    .visual svg .spark {
      animation: twinkle 2.4s ease-in-out infinite;
    }

    .visual svg .orb {
      animation: orbFloat 6s ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    .visual svg .wave {
      animation: waveMove 6s ease-in-out infinite;
      transform-origin: 50% 50%;
    }

    .visual svg .sweep {
      opacity: 0.2;
      animation: sweep 7s linear infinite;
    }

    button {
      font-family: inherit;
      color: inherit;
    }

    .action-btn {
      appearance: none;
      border: none;
      border-radius: 16px;
      padding: 16px 20px 16px 54px;
      font-size: 18px;
      font-weight: 700;
      background: var(--panel);
      box-shadow: 0 10px 20px var(--shadow);
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease, opacity 0.2s ease;
      position: relative;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .choice-btn::before {
      content: "";
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.12);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
    }

    #optionA.choice-btn::before {
      content: "1";
    }

    #optionB.choice-btn::before {
      content: "2";
    }

    .primary {
      background: linear-gradient(135deg, #ff7a1a 0%, #ff4d00 100%);
    }

    .secondary {
      background: linear-gradient(135deg, #2dd4bf 0%, #22c55e 100%);
    }

    .chip {
      appearance: none;
      border: 1px solid #253045;
      background: #141a23;
      color: #c6d0e1;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.08s ease, border 0.2s ease, color 0.2s ease;
    }

    .chip:active {
      transform: translateY(1px);
    }

    .chip.active {
      border-color: var(--accent-2);
      color: var(--text);
    }

    .chip.theme {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chip .swatches {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chip .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    .status {
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .hint {
      min-height: 18px;
      font-size: 13px;
      color: #b7c2d6;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .hint.pop {
      animation: hintPop 0.4s ease;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 10, 14, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .panel {
      background: #121720;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px var(--shadow);
      animation: scaleIn 0.3s ease;
    }

    .panel h2 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .panel p {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .panel .score-big {
      font-size: 42px;
      font-weight: 800;
      margin: 10px 0 20px;
      color: var(--danger);
    }

    .panel .score-big.win {
      color: var(--success);
    }

    .result-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #rewardBtn {
      display: none;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #1f8ef1 0%, #23d5ab 100%);
    }

    .result-meta span {
      color: var(--text);
      font-size: 13px;
      margin-left: 6px;
    }

    .achievements {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 12px;
    }

    .achievement {
      padding: 6px 8px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #1b2431;
      color: #cfe4ff;
      border: 1px solid transparent;
    }

    .achievement.new {
      border-color: #5fb3ff;
      color: #ffffff;
      background: #223246;
    }

    .last-runs {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .high-scores {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .high-scores .title {
      color: #cfe4ff;
      font-size: 11px;
    }

    .panel .action-btn {
      width: 100%;
    }

    .fade {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes hintPop {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content.shake {
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-4px); }
      100% { transform: translateX(0); }
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(6px) scale(1.05); }
    }

    @keyframes waveMove {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    @keyframes sweep {
      from { transform: translateX(-140px); }
      to { transform: translateX(460px); }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }

    @media (max-height: 640px) {
      .game {
        min-height: 560px;
      }
      .visual {
        height: 200px;
      }
      .question {
        font-size: 20px;
      }
      .action-btn {
        font-size: 16px;
      }
      .ad-slot {
        min-height: 56px;
      }
    }
  </style>
</head>

  <main class="game" aria-live="polite">

    <div class="ad-slot" id="adBanner" aria-label="Реклама">Реклама</div>

        <div class="achievements" id="achievements"></div>
        <div class="last-runs" id="lastRuns"></div>
        <div class="high-scores" id="highScores"></div>
        <button class="action-btn" id="restartBtn" type="button">Играть снова</button>
      </div>
    </div>
  </main>

    const setHint = (text, pop = false) => {

    const initAudio = () => {
      if (audioCtx) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      audioCtx = new AudioContext();
    };

    const playTone = (freq, duration = 0.12, type = "sine", volume = 0.05) => {
      if (!state.sound) return;
      initAudio();
      if (!audioCtx) return;
      if (audioCtx.state === "suspended") {
        audioCtx.resume().catch(() => {});
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      osc.stop(audioCtx.currentTime + duration);
    };

    const vibrate = (pattern) => {

          <text x="160" y="142" font-size="15" text-anchor="middle" fill="#eef3ff">${sceneData.title}</text>

    const getTodayKey = () => {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };

    const seedFromString = (value) => {
      let hash = 0;
      for (let i = 0; i < value.length; i += 1) {
        hash = (hash << 5) - hash + value.charCodeAt(i);
        hash |= 0;
      }
      return hash >>> 0;
    };

    const mulberry32 = (seed) => {
      let t = seed;
      return () => {
        t += 0x6d2b79f5;
        let x = t;
        x = Math.imul(x ^ (x >>> 15), x | 1);
        x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
        return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
      };
    };

    const seededShuffle = (array, seed) => {
      const result = [...array];
      const rand = mulberry32(seed);
      for (let i = result.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rand() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    };

    const renderThemeButton = (theme) => {

    const updateHighScores = (entry) => {
      const scores = loadHighScores();

    const renderHighScores = () => {

      const lines = scores.slice(0, 5).map((run, index) => {

      highScoresEl.innerHTML = `<div class="title">Топ забегов</div>` + lines.map((line) => `<div>${line}</div>`).join("");

    const unlockAchievement = (id) => {

      const unlocked = new Set(state.unlockedThisRun);

    const updateScore = () => {

    const updateSpeedInfo = () => {
      if (!speedInfoEl) return;
      if (state.tutorialActive) {
        speedInfoEl.textContent = "Обучение";
        return;
      }
      if (state.current && state.current.calm) {
        speedInfoEl.textContent = "Пауза";
        return;

      const step = ((state.levelIndex - 1) % CONFIG.speedUpEvery);
      const remaining = CONFIG.speedUpEvery - (step < 0 ? 0 : step);
      speedInfoEl.textContent = `Ускорение через ${remaining}`;
    };

    const stopTimer = () => {
      clearTimeout(timerId);
      cancelAnimationFrame(animationId);
    };

    const tickTimer = () => {
      const elapsed = performance.now() - startTime;
      const remaining = Math.max(state.duration - elapsed, 0);
      const progress = remaining / state.duration;
      timerFill.style.width = `${progress * 100}%`;
      if (remaining > 0) {
        animationId = requestAnimationFrame(tickTimer);
      }
    };

    const startTimer = () => {
      stopTimer();
      if (state.current && state.current.calm) {
        timerLabel.textContent = "Пауза";
        timerFill.style.width = "100%";
        return;
      }
      timerLabel.textContent = "";
      startTime = performance.now();
      timerId = setTimeout(() => {
        handleFailure("time");
      }, state.duration);
      tickTimer();
    };

    const updateDuration = () => {
      if (state.tutorialActive) {
        state.duration = Math.max(CONFIG.baseDuration, 5500);
        updateSpeedInfo();
        return;
      }
      const speedSteps = Math.floor((state.levelIndex - 1) / CONFIG.speedUpEvery);
      state.duration = Math.max(CONFIG.minDuration, CONFIG.baseDuration - speedSteps * CONFIG.speedUpBy);
      updateSpeedInfo();
    };

    const weightForLevel = (level) => {
      let weight = CATEGORY_WEIGHTS[level.category] || 1;
      if (level.jackpot) weight *= 0.4;
      if (level.risk) weight *= 0.6;
      if (level.calm) weight *= 0.55;
      if (level.trap) weight *= 0.45;
      return weight;
    };

    const weightedPick = () => {
      const pool = getActiveLevels();
      let candidates = pool.filter((level) => !state.recent.includes(level.id));
      if (!candidates.length) {
        candidates = [...pool];
      }
      const total = candidates.reduce((sum, level) => sum + weightForLevel(level), 0);
      let roll = Math.random() * total;
      for (const level of candidates) {
        roll -= weightForLevel(level);
        if (roll <= 0) {
          return level;
        }
      }
      return candidates[candidates.length - 1];
    };

    const pickLevel = () => {
      for (let i = 0; i < 5; i += 1) {
        const candidate = weightedPick();
        const last = state.lastCategories[state.lastCategories.length - 1];
        const prev = state.lastCategories[state.lastCategories.length - 2];
        if (last && prev && candidate.category === last && candidate.category === prev) {
          continue;
        }
        return candidate;
      }
      return weightedPick();
    };

    const prepareDailyQueue = () => {
      const pool = getActiveLevels();
      const seed = seedFromString(getTodayKey());
      const shuffled = seededShuffle(pool, seed);
      state.dailyQueue = shuffled.slice(0, CONFIG.dailyCount);
      state.dailyIndex = 0;
    };

    const renderLevel = () => {
      content.classList.remove("fade");
      void content.offsetWidth;
      content.classList.add("fade");

      let title = `Уровень ${state.levelIndex}`;
      if (state.tutorialActive) {
        title = `Обучение ${state.tutorialIndex}/${tutorialLevels.length}`;
      } else if (state.mode === "daily") {
        title = `День ${state.dailyIndex}/${state.dailyQueue.length}`;
      }

      levelStatus.textContent = title;
      questionEl.textContent = state.current.question;
      optionA.textContent = state.current.options[0];
      optionB.textContent = state.current.options[1];
      visualEl.innerHTML = makeVisual(state.current);

      const tags = [];
      if (state.tutorialActive) tags.push("Обучение");
      if (state.current.category) {
        tags.push(CATEGORY_LABELS[state.current.category] || state.current.category);
      }
      if (state.current.jackpot) tags.push("Джекпот");
      if (state.current.risk) tags.push("Риск");
      if (state.current.trap) tags.push("Ловушка");
      if (state.current.calm) tags.push("Пауза");
      if (state.difficulty === "hard") tags.push("Хард");
      setHint(tags.join(" • ") || "Готов? Жми быстро.");
    };

    const nextLevel = () => {
      state.status = "playing";
      state.current = null;
      if (state.tutorialActive) {
        if (state.tutorialIndex < tutorialLevels.length) {
          state.current = tutorialLevels[state.tutorialIndex];
          state.tutorialIndex += 1;
        } else {
          state.tutorialActive = false;
          localStorage.setItem(STORAGE.tutorial, "1");
          setHint("Обучение пройдено!", true);
        }
      }
      if (state.mode === "daily") {
        if (!state.current && state.dailyIndex >= state.dailyQueue.length) {
          return completeDaily();
        }
        if (!state.current) {
          state.current = state.dailyQueue[state.dailyIndex];
          state.dailyIndex += 1;
        }
      } else {
        if (!state.current) {
          state.current = pickLevel();
          state.recent.push(state.current.id);
          if (state.recent.length > 8) state.recent.shift();
          if (state.current.category) {
            state.lastCategories.push(state.current.category);
            if (state.lastCategories.length > 4) state.lastCategories.shift();
          }
        }
      }
      state.levelIndex += 1;
      updateDuration();
      renderLevel();
      startTimer();
    };

    const addScore = (level) => {
      let points = 1;
      if (level.jackpot) points += 1;
      if (level.risk) points += 1;
      if (level.trap) points += 2;
      if (state.streak > 0 && state.streak % 5 === 0) points += 1;
      state.score += points;
      updateScore();
      return points;
    };

    const handleSuccess = () => {
      stopTimer();
      state.streak += 1;
      state.bestStreakRun = Math.max(state.bestStreakRun, state.streak);
      updateStreak();
      playTone(620, 0.12, "triangle", 0.06);
      vibrate(20);

      if (state.streak >= 5) unlockAchievement("streak5");
      if (state.streak >= 10) unlockAchievement("streak10");
      if (state.current.jackpot) unlockAchievement("jackpot");
      if (state.current.risk) unlockAchievement("riskWin");
      if (state.mistakes === 0 && state.levelIndex >= 10) unlockAchievement("perfect10");

      const points = addScore(state.current);
      updateHint(points);
      state.status = "transition";
      setTimeout(nextLevel, CONFIG.transitionDelay);
    };

    const handleFailure = (reasonType) => {
      if (state.status !== "playing") return;
      stopTimer();
      state.streak = 0;
      state.mistakes += 1;
      updateStreak();

      const phrases = failReactions[reasonType] || failReactions.wrong;
      const phrase = phrases[Math.floor(Math.random() * phrases.length)];
      const detail = reasonType === "time" ? "Время вышло." : "Неверный выбор.";
      const combined = `${phrase} ${detail}`;
      playTone(180, 0.18, "sawtooth", 0.06);
      vibrate([40, 20, 40]);

      const lifeLoss = state.current && state.current.risk ? 2 : 1;
      state.lives = Math.max(0, state.lives - lifeLoss);
      updateLives();

      if (state.current && state.current.risk && state.score > 0) {
        state.score = Math.max(0, state.score - 1);
        updateScore();
      }

      setHint(`${phrase} -${lifeLoss}❤`, true);
      content.classList.remove("shake");
      void content.offsetWidth;
      content.classList.add("shake");

      if (state.lives <= 0) {
        return gameOver(combined);
      }

      state.status = "transition";
      setTimeout(nextLevel, 350);
    };

    const gameOver = (reason, won = false) => {
      state.status = "over";
      stopTimer();
      overlay.classList.add("show");

      if (state.score > state.bestScore) {
        state.bestScore = state.score;
        localStorage.setItem(STORAGE.bestScore, state.bestScore.toString());
      }
      if (state.bestStreakRun > state.bestStreak) {
        state.bestStreak = state.bestStreakRun;
        localStorage.setItem(STORAGE.bestStreak, state.bestStreak.toString());
      }
      updateBest();

      const runs = loadRuns();
      runs.unshift({
        date: getTodayKey(),
        score: state.score,
        mode: state.mode
      });
      saveRuns(runs);

      updateHighScores({
        date: getTodayKey(),
        score: state.score,
        mode: state.mode,
        difficulty: state.difficulty
      });

      resultTitle.textContent = won ? "Победа!" : "Проигрыш";
      resultText.textContent = reason;
      finalScore.textContent = state.score.toString();
      finalScore.classList.toggle("win", won);
      bestScoreFinal.textContent = state.bestScore.toString();
      bestStreakFinal.textContent = state.bestStreak.toString();
      if (rewardBtn) {
        const canReward = state.lives <= 0 && ADS.rewardedId !== "REPLACE_WITH_YANDEX_REWARDED_ID";
        rewardBtn.style.display = canReward ? "block" : "none";
      }
      renderAchievements();
      renderRuns();
      renderHighScores();
    };

    const completeDaily = () => {
      unlockAchievement("dailyHero");
      const today = getTodayKey();
      const bestDate = localStorage.getItem(STORAGE.dailyDate);
      let bestDaily = Number(localStorage.getItem(STORAGE.dailyBest)) || 0;
      if (bestDate != today) {
        bestDaily = 0;
      }
      if (state.score > bestDaily) {
        localStorage.setItem(STORAGE.dailyBest, state.score.toString());
        localStorage.setItem(STORAGE.dailyDate, today);
      }
      gameOver("Дневной челлендж пройден.", true);
    };

    const restartGame = () => {
      overlay.classList.remove("show");
      state.status = "playing";
      state.score = 0;
      state.streak = 0;
      state.bestStreakRun = 0;
      state.lives = CONFIG.lives;
      state.levelIndex = 0;
      state.current = null;
      state.duration = CONFIG.baseDuration;
      state.recent = [];
      state.lastCategories = [];
      if (state.tutorialActive) {
        state.tutorialIndex = 0;
      }
      state.mistakes = 0;
      state.unlockedThisRun = [];
      updateScore();
      updateStreak();
      updateLives();
      setHint("Готов? Жми быстро.");

      if (state.mode === "daily") {
        prepareDailyQueue();
      }
      nextLevel();
    };

    const applyMode = (mode) => {
      state.mode = mode;
      modeBtn.textContent = mode === "daily" ? "Режим: Дневной" : "Режим: Бесконечный";
      modeBtn.classList.toggle("active", mode === "daily");
      restartGame();
    };

    const applyDifficulty = (difficulty, shouldRestart = true) => {
      state.difficulty = difficulty;
      difficultyBtn.textContent = difficulty === "hard" ? "Сложность: Хард" : "Сложность: Норм";
      difficultyBtn.classList.toggle("active", difficulty === "hard");
      localStorage.setItem(STORAGE.difficulty, difficulty);
      if (shouldRestart) {
        restartGame();
      }
    };

    const applySound = (enabled) => {
      state.sound = enabled;
      soundBtn.textContent = enabled ? "Звук: Вкл" : "Звук: Выкл";
      soundBtn.classList.toggle("active", enabled);
      localStorage.setItem(STORAGE.sound, enabled ? "1" : "0");
    };

    const applyVibe = (enabled) => {
      state.vibe = enabled;
      vibeBtn.textContent = enabled ? "Вибро: Вкл" : "Вибро: Выкл";
      vibeBtn.classList.toggle("active", enabled);
      localStorage.setItem(STORAGE.vibe, enabled ? "1" : "0");
    };

    optionA.addEventListener("click", () => {
      if (state.status !== "playing") return;
      if (!state.current) return;
      playTone(420, 0.05, "sine", 0.03);
      state.current.correct === 0 ? handleSuccess() : handleFailure("wrong");
    });

    optionB.addEventListener("click", () => {
      if (state.status !== "playing") return;
      if (!state.current) return;
      playTone(420, 0.05, "sine", 0.03);
      state.current.correct === 1 ? handleSuccess() : handleFailure("wrong");
    });

    document.addEventListener("keydown", (event) => {
      if (state.status !== "playing") return;
      if (event.key === "1") optionA.click();
      if (event.key === "2") optionB.click();
    });

    restartBtn.addEventListener("click", restartGame);
    rewardBtn.addEventListener("click", async () => {
      rewardBtn.disabled = true;
      const rewarded = await renderRewarded();
      rewardBtn.disabled = false;
      if (!rewarded) return;
      overlay.classList.remove("show");
      state.lives = 1;
      updateLives();
      setHint("Второй шанс!");
      state.status = "playing";
      state.current = null;
      nextLevel();
    });
    modeBtn.addEventListener("click", () => {
      applyMode(state.mode === "daily" ? "endless" : "daily");
    });

    themeBtn.addEventListener("click", () => {
      state.themeIndex = (state.themeIndex + 1) % THEMES.length;
      localStorage.setItem(STORAGE.theme, state.themeIndex.toString());
      applyTheme(state.themeIndex);
    });

    difficultyBtn.addEventListener("click", () => {
      applyDifficulty(state.difficulty === "hard" ? "normal" : "hard", true);
    });

    soundBtn.addEventListener("click", () => {
      applySound(!state.sound);
      if (state.sound) {
        playTone(520, 0.08, "triangle", 0.05);
      }
    });

    vibeBtn.addEventListener("click", () => {
      applyVibe(!state.vibe);
      vibrate(30);
    });

    const init = () => {
      state.bestScore = Number(localStorage.getItem(STORAGE.bestScore)) || 0;
      state.bestStreak = Number(localStorage.getItem(STORAGE.bestStreak)) || 0;
      state.themeIndex = Number(localStorage.getItem(STORAGE.theme)) || 0;
      state.difficulty = localStorage.getItem(STORAGE.difficulty) || "normal";
      state.sound = localStorage.getItem(STORAGE.sound) !== "0";
      state.vibe = localStorage.getItem(STORAGE.vibe) !== "0";
      state.tutorialActive = localStorage.getItem(STORAGE.tutorial) !== "1";
      state.achievements = new Set(
        JSON.parse(localStorage.getItem(STORAGE.achievements) || "[]")
      );
      updateBest();
      updateScore();
      updateStreak();
      updateLives();
      applyTheme(state.themeIndex);
      applyDifficulty(state.difficulty, false);
      applySound(state.sound);
      applyVibe(state.vibe);
      applyMode("endless");
      showBannerAd();
    };

    init();
  </script>
</body>
</html>
